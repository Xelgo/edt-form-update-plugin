<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EDT Form Update</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      width: min(760px, calc(100% - 48px));
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      font-weight: 700;
    }

    p {
      margin: 0 0 16px;
      font-size: 17px;
    }

    code {
      display: block;
      margin: 16px 0;
      padding: 14px 16px;
      overflow-wrap: anywhere;
      border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
      border-radius: 6px;
      background: color-mix(in srgb, CanvasText 6%, transparent);
      font: 15px ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    a {
      color: LinkText;
    }
  </style>
</head>
<body>
  <main>
    <h1>EDT Form Update</h1>
    <p>Плагин для 1C:EDT, который пакетно обновляет формы расширения после изменения форм в расширяемой конфигурации.</p>
    <p>Для установки в EDT используйте update site:</p>
    <code>https://xelgo.github.io/edt-form-update-plugin/update-site/</code>
    <p><a href="update-site/">Открыть p2 update site</a></p>
  </main>
</body>
</html>
